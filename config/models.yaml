# ===============================
# Model Configuration
# ===============================

# ---------- TOC Detection ----------
toc_detection:
  keyword_based:
    enabled: true
    keywords:
      - "table of contents"
      - "contents"
      - "index"
      - "chapter"
      - "section"
    min_confidence: 0.65

  vision_llm:
    enabled: true
    purpose: "toc_verification"
    input_type: "image_base64"
    expected_output: "YES|NO"

    provider: local       # local | api
    model: "qwen2-vl:7b"  # improved vision model for document understanding
    max_tokens: 10
    temperature: 0.0


# ---------- OCR ----------
ocr:
  enabled: true
  engine: paddleocr      # more accurate than tesseract
  language: eng
  dpi: 300
  confidence_threshold: 0.55


# ---------- Offset Identification ----------
offset_detection:
  enabled: true
  anchor_matching:
    min_anchor_length: 5
    min_occurrences: 2
    frequency_strategy: "max"

  negative_offset_handling:
    clamp_to_zero: true


# ---------- Style Identification ----------
style_detection:
  enabled: true
  font_analysis:
    detect_font_size: true
    min_occurrence_ratio: 0.05

  roles:
    chapter: "largest_frequent"
    subheading: "second_largest"
    body: "most_frequent"

  running_header_footer:
    remove: true
    frequency_threshold: 0.8


# ---------- Chunk Accumulation ----------
chunking:
  enabled: true
  strategy: "hierarchical"

  max_chars: 800
  split_on: "sentence"

  accumulation_rules:
    anchor: "subheading"
    chapter_scope: true
    allow_cross_page: true

  ordering:
    sort_by: "page_physical"


# ---------- Overlap ----------
overlap:
  enabled: true
  pre_overlap: 120
  post_overlap: 120


# ---------- Embeddings ----------
embedding:
  enabled: true
  provider: sentence-transformers
  model: BAAI/bge-base-en-v1.5   # much stronger than MiniLM
  device: cpu
  normalize: true


# ---------- Retriever ----------
retriever:
  default: hybrid

  semantic:
    top_k: 12

  graph:
    enabled: true
    traversal_depth: 2

  reranker:
    enabled: true
    model: BAAI/bge-reranker-base
    top_k: 6


# ---------- Answering ----------
answering:
  llm:
    provider: local
    model: qwen2.5:7b
    temperature: 0.1
    max_tokens: 600

  citation:
    enabled: true
    format: "Author, Book, Page {page_label}"

  safety:
    refuse_if_no_context: true


# ---------- Performance ----------
performance:
  batch_size: 8
  enable_caching: true
  cache_ttl: 3600


# ---------- Logging ----------
logging:
  level: INFO
  log_model_calls: false


# ---------- Emotion Analysis ----------
emotion:
  provider: local
  model: phi3:mini
  temperature: 0.0
  max_tokens: 50